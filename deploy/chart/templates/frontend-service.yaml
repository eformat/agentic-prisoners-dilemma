apiVersion: v1
kind: Service
metadata:
  name: {{ include "prisoners-dilemma.fullname" . }}-frontend
  labels:
    {{- include "prisoners-dilemma.frontend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "prisoners-dilemma.frontend.selectorLabels" . | nindent 4 }}
