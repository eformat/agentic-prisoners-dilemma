apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "prisoners-dilemma.fullname" . }}-backend
  labels:
    {{- include "prisoners-dilemma.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "prisoners-dilemma.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "prisoners-dilemma.backend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          env:
            {{- range $key, $val := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: BEARER
              valueFrom:
                secretKeyRef:
                  name: {{ include "prisoners-dilemma.fullname" . }}-backend
                  key: BEARER
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
