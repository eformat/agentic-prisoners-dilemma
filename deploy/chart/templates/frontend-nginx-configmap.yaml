apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prisoners-dilemma.fullname" . }}-nginx
  labels:
    {{- include "prisoners-dilemma.frontend.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes  1;

    events {
        worker_connections  1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        access_log  /dev/stdout;
        error_log   /dev/stderr info;

        sendfile        on;
        keepalive_timeout  65;

        # API upstream to backend service (cluster-internal)
        upstream api_backend {
            server {{ include "prisoners-dilemma.fullname" . }}-backend:{{ .Values.backend.port }};
        }

        server {
            listen       0.0.0.0:8080;
            server_name  _;

            root   /usr/share/nginx/html;
            index  index.html;

            # Proxy /api/* requests to the backend
            location /api/ {
                proxy_pass http://api_backend;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 300s;
                proxy_send_timeout 300s;
            }

            location / {
                try_files $uri $uri/ /index.html;
            }
        }
    }
